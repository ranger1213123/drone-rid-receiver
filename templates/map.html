<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drone RID — 无人机监控</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Design Tokens ── */
:root{
  --bg:#f0f2f5; --surface:#fff; --border:#e0e3e8;
  --text:#1a1d23; --muted:#6b7280;
  --blue:#2563eb; --blue-bg:#eff6ff;
  --green:#16a34a; --green-bg:#f0fdf4;
  --yellow:#ca8a04; --yellow-bg:#fefce8;
  --orange:#ea580c; --orange-bg:#fff7ed;
  --red:#dc262e; --red-bg:#fef2f2;
  --radius-sm:6px; --radius:10px; --radius-lg:14px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
  --transition:180ms ease;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;overflow:hidden}
#map{width:100%;height:100%;background:#e8e8e8}

/* ── Sidebar ── */
#sidebar{
  position:fixed;top:0;left:0;width:370px;height:100%;
  background:rgba(255,255,255,.96);backdrop-filter:blur(12px);
  box-shadow:2px 0 20px rgba(0,0,0,.1);z-index:1000;
  display:flex;flex-direction:column;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;overflow-x:hidden;
}
#sidebar.collapsed{transform:translateX(-370px)}

/* ── Sidebar sections ── */
.side-section{border-bottom:1px solid var(--border)}
.side-head{
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;font-weight:600;font-size:12px;color:var(--text);
  position:sticky;top:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);z-index:2;
}
.side-head:hover{background:#f9fafb}
.side-head .head-icon{display:flex;align-items:center;gap:8px}
.side-head .chevron{transition:transform var(--transition);font-size:10px;color:var(--muted)}
.side-body{padding:0 0 8px}
.side-body.collapsed{display:none}
.side-head .chevron.open{transform:rotate(90deg)}

/* Brand header */
#sidebar .brand-head{
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);position:sticky;top:0;
  background:rgba(255,255,255,.96);backdrop-filter:blur(8px);z-index:3;
}
.brand-head .title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.brand-head .ver{font-size:10px;color:var(--muted);margin-left:6px;font-weight:400}

/* Status dot */
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,.4)}50%{box-shadow:0 0 0 6px rgba(22,163,74,0)}}
.st-dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background .2s}
.st-dot.live{background:var(--green);animation:dotPulse 2s infinite}

/* Stats mini */
.stats-mini{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;padding:10px 14px}
.sm{border-radius:8px;padding:10px 6px;text-align:center;transition:transform .12s}
.sm:hover{transform:translateY(-1px)}
.sm .v{font-size:22px;font-weight:700;line-height:1.1}
.sm .l{font-size:9px;color:var(--muted);margin-top:1px}
.sm-i{background:var(--blue-bg)} .sm-i .v{color:var(--blue)}
.sm-w{background:var(--yellow-bg)} .sm-w .v{color:var(--yellow)}
.sm-s{background:var(--orange-bg)} .sm-s .v{color:var(--orange)}
.sm-c{background:var(--red-bg)} .sm-c .v{color:var(--red)}

/* Drone list rows */
.drone-row{
  display:flex;align-items:center;gap:8px;padding:8px 14px;
  cursor:pointer;transition:background .1s;font-size:12px;
}
.drone-row:hover{background:#f6f8fa}
.drone-row .d-icon{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.drone-row .d-icon.active{background:var(--green);box-shadow:0 0 4px rgba(22,163,74,.35)}
.drone-row .d-icon.warning{background:var(--yellow);box-shadow:0 0 4px rgba(202,138,4,.35)}
.drone-row .d-icon.severe{background:var(--orange);box-shadow:0 0 4px rgba(234,88,12,.35)}
.drone-row .d-icon.critical{background:var(--red);box-shadow:0 0 4px rgba(220,38,38,.35);animation:dotPulse 1.4s infinite}
.drone-row .d-icon.gone{background:#bbb}
.drone-row .d-info{flex:1;min-width:0}
.drone-row .d-id{font-weight:600;font-size:11px;font-family:"JetBrains Mono","SF Mono",Consolas,monospace}
.drone-row .d-sub{font-size:10px;color:var(--muted)}
.drone-row .d-dist{font-weight:700;font-size:12px}

/* Power line mini */
.pl-mini{display:flex;align-items:center;gap:8px;padding:4px 14px;font-size:11px;cursor:pointer;transition:color .1s}
.pl-mini:hover{color:var(--blue)}
.pl-mini .pl-swatch{width:16px;height:3px;border-radius:1px;flex-shrink:0}

/* Station info */
.station-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px 14px}
.station-item{font-size:11px}
.station-item .sk{color:var(--muted);font-size:10px}
.station-item .sv{font-weight:600;color:var(--text)}

/* Charts */
.chart-wrap{padding:8px 14px;position:relative;height:140px}
.chart-wrap canvas{width:100%!important;height:100%!important}
.model-bar{display:flex;align-items:center;gap:8px;padding:4px 14px;font-size:11px}
.model-bar .m-name{width:70px;text-align:right;color:var(--muted);flex-shrink:0}
.model-bar .m-track{flex:1;height:18px;border-radius:3px;background:var(--bg);position:relative;overflow:hidden}
.model-bar .m-fill{height:100%;border-radius:3px;background:var(--blue);opacity:.75;transition:width .4s ease}
.model-bar .m-cnt{width:28px;text-align:right;font-weight:600;font-size:10px;color:var(--text)}

/* Legend inline */
.legend-inline{display:flex;flex-wrap:wrap;gap:10px;padding:8px 14px;font-size:11px}
.legend-inline .li{display:flex;align-items:center;gap:4px}
.leg-dot{width:9px;height:9px;border-radius:50%}

/* Buttons in sidebar */
.btn-sm{
  padding:4px 12px;border-radius:var(--radius-sm);font-size:11px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);background:var(--surface);
  transition:all .1s;white-space:nowrap;
}
.btn-sm:hover{background:#f3f4f6;border-color:#c0c4cc}
.btn-sm.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-sm.danger{background:var(--red);color:#fff;border-color:var(--red)}

/* Collapse toggle */
#collapseBtn{
  position:fixed;top:14px;left:378px;z-index:1001;
  width:28px;height:28px;border-radius:50%;background:var(--surface);
  border:1px solid var(--border);cursor:pointer;font-size:12px;display:flex;
  align-items:center;justify-content:center;
  box-shadow:var(--shadow-md);transition:left .3s cubic-bezier(.4,0,.2,1),transform .15s;
}
#collapseBtn:hover{transform:scale(1.1)}
#collapseBtn.shifted{left:8px}

/* Top-right overlays */
#topControls{
  position:fixed;top:14px;right:14px;z-index:900;display:flex;gap:8px;
}
.btn-map{
  padding:7px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);background:var(--surface);
  box-shadow:var(--shadow);transition:all .15s;
}
.btn-map:hover{background:#f9fafb;border-color:#b0b4bc}

/* Leaflet popup */
.leaflet-popup-content{font-size:12px;font-family:inherit}
.leaflet-popup-content b{font-size:13px}
.popup-row{display:flex;justify-content:space-between;gap:12px;margin:3px 0}
.popup-btn{
  display:inline-block;margin-top:6px;padding:5px 14px;border-radius:var(--radius-sm);
  font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--blue);
  color:var(--blue);background:#fff;transition:all .15s;
}
.popup-btn:hover{background:var(--blue-bg)}
.popup-btn.traj-active{background:var(--blue);color:#fff}

/* Empty state */
.empty-state{text-align:center;padding:20px;color:var(--muted);font-size:12px}

/* Select in sidebar */
.side-select{font-size:11px;padding:4px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);margin:0 14px 8px}

/* Responsive */
@media(max-width:800px){
  #sidebar{width:90vw;max-width:340px}
  #sidebar.collapsed{transform:translateX(-90vw)}
  #collapseBtn{left:calc(90vw + 8px)}
  #collapseBtn.shifted{left:8px}
  #topControls{top:8px;right:8px}
  .stats-mini{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="map"></div>

<!-- ════ Sidebar ════ -->
<div id="sidebar">
  <!-- Brand + Status -->
  <div class="brand-head">
    <div class="title">
      <span class="st-dot stop" id="statusDot"></span>
      Drone RID Monitor <span class="ver">v3.0</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <select id="modeSelect" class="side-select" style="margin:0;width:auto">
        <option value="simulated">模拟</option><option value="ble">BLE</option><option value="wifi">WiFi</option>
      </select>
      <button class="btn-sm primary" onclick="startScan()" id="btnStart" style="padding:4px 10px">▶</button>
      <button class="btn-sm danger" onclick="stopScan()" id="btnStop" disabled style="padding:4px 10px">■</button>
    </div>
  </div>

  <!-- ── Stats Mini ── -->
  <div class="stats-mini side-section">
    <div class="sm sm-i"><div class="v" id="sTotal">0</div><div class="l">活跃</div></div>
    <div class="sm sm-w"><div class="v" id="sWarn">0</div><div class="l">警告</div></div>
    <div class="sm sm-s"><div class="v" id="sSev">0</div><div class="l">严重</div></div>
    <div class="sm sm-c"><div class="v" id="sCrit">0</div><div class="l">危险</div></div>
  </div>

  <!-- ── 24h Alert Chart ── -->
  <div class="side-section">
    <div class="side-head" onclick="toggleSection('secChart',this)">
      <span class="head-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><polyline points="3,20 7,13 11,16 15,6 19,10 21,8"/></svg>
        24h 预警趋势
      </span>
      <span class="chevron open" id="secChartChev">▶</span>
    </div>
    <div class="side-body" id="secChart">
      <div class="chart-wrap"><canvas id="alertChart"></canvas></div>
    </div>
  </div>

  <!-- ── Drone Models ── -->
  <div class="side-section">
    <div class="side-head" onclick="toggleSection('secModel',this)">
      <span class="head-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        无人机型号
      </span>
      <span class="chevron open" id="secModelChev">▶</span>
    </div>
    <div class="side-body" id="secModel">
      <div id="modelBars" style="padding:4px 0"><div class="empty-state">等待数据...</div></div>
    </div>
  </div>

  <!-- ── Station Info ── -->
  <div class="side-section">
    <div class="side-head" onclick="toggleSection('secStation',this)">
      <span class="head-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        站点信息
      </span>
      <span class="chevron" id="secStationChev">▶</span>
    </div>
    <div class="side-body collapsed" id="secStation">
      <div class="station-grid" id="stationGrid">
        <div class="empty-state" style="grid-column:1/-1">加载中...</div>
      </div>
    </div>
  </div>

  <!-- ── Active Drones ── -->
  <div class="side-section">
    <div class="side-head" onclick="toggleSection('secDrones',this)">
      <span class="head-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><path d="M12 2L8 6h3v4.5L7 12l-3-1.5V13l3 2v3l5 3 5-3v-3l3-2v-2.5l-3 1.5-4-1.5V6h3l-4-4z"/></svg>
        活跃无人机 <span id="droneCountLabel" style="font-weight:400;color:var(--muted);font-size:11px">0</span>
      </span>
      <span class="chevron open" id="secDronesChev">▶</span>
    </div>
    <div class="side-body" id="secDrones" style="max-height:260px;overflow-y:auto">
      <div id="droneList"><div class="empty-state">等待信号...</div></div>
    </div>
  </div>

  <!-- ── Power Lines ── -->
  <div class="side-section">
    <div class="side-head" onclick="toggleSection('secPL',this)">
      <span class="head-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2"><polyline points="2,20 12,3 22,20"/><circle cx="12" cy="8" r="2"/></svg>
        电力线 <span id="plCountLabel" style="font-weight:400;color:var(--muted);font-size:11px">0</span>
      </span>
      <span class="chevron" id="secPLChev">▶</span>
    </div>
    <div class="side-body collapsed" id="secPL" style="max-height:200px;overflow-y:auto">
      <div id="plItems"><div class="empty-state">加载中...</div></div>
    </div>
  </div>

  <!-- ── Legend ── -->
  <div class="side-section">
    <div class="legend-inline">
      <span class="li"><span class="leg-dot" style="background:var(--green)"></span>正常</span>
      <span class="li"><span class="leg-dot" style="background:var(--yellow)"></span>警告</span>
      <span class="li"><span class="leg-dot" style="background:var(--orange)"></span>严重</span>
      <span class="li"><span class="leg-dot" style="background:var(--red)"></span>危险</span>
      <span class="li"><span class="leg-dot" style="background:#bbb"></span>离线</span>
      <span class="li" style="width:100%;margin-top:4px;padding-top:4px;border-top:1px solid var(--border)">
        <span style="display:inline-block;width:18px;border-top:2px dashed #cc4400"></span>电力线
      </span>
    </div>
  </div>

  <!-- Footer -->
  <div style="padding:8px 16px;font-size:10px;color:var(--muted);display:flex;justify-content:space-between;border-top:1px solid var(--border);margin-top:auto">
    <span id="footerStatus">已停止</span>
    <span id="footerTime">--</span>
  </div>
</div>

<!-- ════ Floating UI ════ -->
<button id="collapseBtn" onclick="toggleSidebar()">◀</button>
<div id="topControls">
  <button class="btn-map" onclick="window.location='/list'">📋 列表视图</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════ Map ═══════════
var map = L.map('map', {attributionControl: true, zoomControl: false}).setView([31, 110], 5);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
}).addTo(map);

var droneMarkers = {};
var trajPolylines = {};
var plPolylines = [];
var plLabels = [];
var activeTrajDrone = null;
var firstDroneSeen = false;

var statusColors = {active:'#16a34a',warning:'#ca8a04',severe:'#ea580c',critical:'#dc262e',gone:'#bbb'};
var statusZh = {active:'正常',warning:'警告',severe:'严重',critical:'危险',gone:'离线'};
function markerColor(s){return statusColors[s]||'#16a34a'}
function markerRadius(s){if(s==='critical')return 10;if(s==='severe')return 8;if(s==='warning')return 6;return 5}

// ═══════════ Sidebar toggle ═══════════
function toggleSidebar(){
  var sb=document.getElementById('sidebar');
  var btn=document.getElementById('collapseBtn');
  sb.classList.toggle('collapsed');
  btn.classList.toggle('shifted');
  btn.textContent=sb.classList.contains('collapsed')?'▶':'◀';
  setTimeout(function(){map.invalidateSize()},350);
}

function toggleSection(id,head){
  var body=document.getElementById(id);
  var chev=head.querySelector('.chevron');
  body.classList.toggle('collapsed');
  if(chev) chev.classList.toggle('open');
}

// ═══════════ Chart.js — 24h alerts ═══════════
var alertChart=null;
function buildAlertChart(hourly){
  var ctx=document.getElementById('alertChart').getContext('2d');

  // Build 24 hourly buckets
  var hours=[];
  var now=new Date();
  for(var i=23;i>=0;i--){
    var d=new Date(now.getFullYear(),now.getMonth(),now.getDate(),now.getHours()-i);
    hours.push(('0'+d.getHours()).slice(-2)+':00');
  }

  var warnData=new Array(24).fill(0);
  var sevData=new Array(24).fill(0);
  var critData=new Array(24).fill(0);

  hourly.forEach(function(h){
    var hourStr=h.hour;
    var idx=hours.findIndex(function(x){return x===hourStr.slice(11,16)});
    if(idx>=0){
      if(h.level==='warning') warnData[idx]=h.count;
      else if(h.level==='severe') sevData[idx]=h.count;
      else if(h.level==='critical') critData[idx]=h.count;
    }
  });

  if(alertChart) alertChart.destroy();
  alertChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:hours,
      datasets:[
        {label:'警告',data:warnData,borderColor:'#ca8a04',backgroundColor:'rgba(202,138,4,.08)',fill:true,tension:.3,pointRadius:1.5,borderWidth:1.5},
        {label:'严重',data:sevData,borderColor:'#ea580c',backgroundColor:'rgba(234,88,12,.08)',fill:true,tension:.3,pointRadius:1.5,borderWidth:1.5},
        {label:'危险',data:critData,borderColor:'#dc262e',backgroundColor:'rgba(220,38,38,.08)',fill:true,tension:.3,pointRadius:2,borderWidth:2},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{intersect:false,mode:'index'},
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:10,font:{size:10},usePointStyle:true}}},
      scales:{
        x:{ticks:{font:{size:9},maxTicksLimit:8,autoSkip:true},grid:{display:false}},
        y:{beginAtZero:true,ticks:{font:{size:9},stepSize:1},grid:{color:'#f0f0f0'}}
      }
    }
  });
}

// ═══════════ Model distribution ═══════════
function buildModelBars(models){
  var div=document.getElementById('modelBars');
  if(!models.length){div.innerHTML='<div class="empty-state">暂无数据</div>';return;}
  var max=models[0].count;
  div.innerHTML=models.map(function(m){
    var pct=Math.max(4,Math.round(m.count/max*100));
    return '<div class="model-bar"><span class="m-name">'+m.name+'</span><div class="m-track"><div class="m-fill" style="width:'+pct+'%"></div></div><span class="m-cnt">'+m.count+'</span></div>';
  }).join('');
}

// ═══════════ Station info ═══════════
function buildStation(s){
  var g=document.getElementById('stationGrid');
  g.innerHTML=[
    ['设备',s.device_name],['位置',s.device_location||'--'],
    ['通道',s.active_channel==='4g_wired'?'4G/有线':s.active_channel==='beidou_emergency'?'北斗应急':'离线'],
    ['4G/有线',s.primary_online?'✅ 在线':'❌ 离线'],
    ['北斗',s.beidou_online?'✅ 在线 (信号:'+s.beidou_signal+')':'❌ 离线'],
    ['积压消息',s.queue_size],
    ['HTTP 已发',s.http_sent],['北斗已发',s.beidou_sent],
    ['最近发送',s.last_send],['电力线',s.pl_count+' 条'],
    ['活跃无人机',s.drone_count+' 架'],
  ].map(function(r){return '<div class="station-item"><div class="sk">'+r[0]+'</div><div class="sv">'+r[1]+'</div></div>'}).join('');
}

// ═══════════ Power lines ═══════════
function loadPowerLines(){
  fetch('/api/powerlines').then(function(r){return r.json()}).then(function(lines){
    plPolylines.forEach(function(p){map.removeLayer(p)});
    plLabels.forEach(function(l){map.removeLayer(l)});
    plPolylines=[];plLabels=[];
    document.getElementById('plCountLabel').textContent=lines.length;

    var html='';
    if(!lines.length){html='<div class="empty-state">无电力线</div>'}
    else{
      lines.forEach(function(l){
        var latlngs=[[l.lat1,l.lon1],[l.lat2,l.lon2]];
        var poly=L.polyline(latlngs,{color:'#cc4400',weight:3,dashArray:'10,8',opacity:.85}).addTo(map);
        var label=L.tooltip({permanent:true,direction:'center'})
          .setLatLng([(l.lat1+l.lat2)/2,(l.lon1+l.lon2)/2])
          .setContent('<span style="font-size:10px;background:rgba(255,255,255,.92);padding:2px 6px;border-radius:4px;color:#cc4400;font-weight:600">'+l.name+'</span>')
          .addTo(map);
        plPolylines.push(poly);plLabels.push(label);
        html+='<div class="pl-mini" onclick="map.flyToBounds([['+l.lat1+','+l.lon1+'],['+l.lat2+','+l.lon2+']],{padding:[80,80]})"><span class="pl-swatch" style="background:#cc4400"></span>'+l.name+'</div>';
      });
    }
    document.getElementById('plItems').innerHTML=html;
  });
}

// ═══════════ Trajectory ═══════════
function showTrajectory(droneId){
  if(activeTrajDrone===droneId){removeTrajectory(droneId);activeTrajDrone=null;return}
  if(activeTrajDrone) removeTrajectory(activeTrajDrone);
  fetch('/api/trajectories/'+encodeURIComponent(droneId)+'/points')
    .then(function(r){return r.json()})
    .then(function(pts){
      if(!pts||pts.length<2){alert('轨迹数据不足');return}
      var latlngs=pts.map(function(p){return[p.lat,p.lon]});
      var line=L.polyline(latlngs,{color:'#2563eb',weight:3,opacity:.75,smoothFactor:1}).addTo(map);
      var sm=L.circleMarker(latlngs[0],{radius:5,color:'#2563eb',fillColor:'#fff',fillOpacity:1,weight:2.5}).addTo(map);
      var em=L.circleMarker(latlngs[latlngs.length-1],{radius:6,color:'#2563eb',fillColor:'#2563eb',fillOpacity:1,weight:2.5}).addTo(map);
      trajPolylines[droneId]={line:line,start:sm,end:em};
      activeTrajDrone=droneId;
      map.fitBounds(line.getBounds(),{padding:[80,80],maxZoom:16});
    });
}
function removeTrajectory(id){
  var l=trajPolylines[id];
  if(l){map.removeLayer(l.line);map.removeLayer(l.start);map.removeLayer(l.end);delete trajPolylines[id]}
  activeTrajDrone=null;
}
function flyToDrone(lat,lon){map.flyTo([lat,lon],Math.max(map.getZoom(),15),{duration:.5})}

function popupContent(dr){
  var s=dr.status||'active';
  var dist=dr.min_distance!=null?dr.min_distance.toFixed(0)+' m':'--';
  var alt=dr.last_alt!=null?dr.last_alt.toFixed(0)+' m':'--';
  return '<b>'+dr.id+'</b>'
    +'<div class="popup-row"><span>状态:</span><span style="color:'+markerColor(s)+';font-weight:600">'+statusZh[s]+'</span></div>'
    +'<div class="popup-row"><span>经度:</span><span>'+(dr.last_lon||0).toFixed(5)+'</span></div>'
    +'<div class="popup-row"><span>纬度:</span><span>'+(dr.last_lat||0).toFixed(5)+'</span></div>'
    +'<div class="popup-row"><span>高度:</span><span>'+alt+'</span></div>'
    +'<div class="popup-row"><span>距离:</span><span>'+dist+'</span></div>'
    +'<div class="popup-row"><span>最近电力线:</span><span>'+(dr.line_name||'--')+'</span></div>'
    +'<button class="popup-btn'+(activeTrajDrone===dr.id?' traj-active':'')+'" onclick="showTrajectory(\''+dr.id+'\')">'+(activeTrajDrone===dr.id?'隐藏轨迹':'显示轨迹')+'</button>';
}

// ═══════════ Stats animation ═══════════
function animateEl(el,target){
  var cur=parseInt(el.textContent)||0;
  if(cur===target)return;
  var step=Math.max(1,Math.abs(target-cur)/8);
  var dir=target>cur?1:-1;
  function tick(){
    cur+=step*dir;
    if(dir>0?cur>=target:cur<=target){el.textContent=target;return}
    el.textContent=Math.round(cur);
    requestAnimationFrame(tick);
  }
  tick();
}

// ═══════════ Main update ═══════════
var prevAlertLevels={};
function updateAll(){
  fetch('/api/status').then(function(r){return r.json()}).then(function(d){
    var running=d.running;
    var dot=document.getElementById('statusDot');
    dot.className='st-dot'+(running?' live':'stop');
    document.getElementById('footerStatus').textContent=running?'运行中 ('+d.mode.toUpperCase()+')':'已停止';
    document.getElementById('btnStart').disabled=running;
    document.getElementById('btnStop').disabled=!running;

    // Stats
    var warn=0,sev=0,crit=0;
    d.drones.forEach(function(dr){var s=dr.status;if(s==='warning')warn++;if(s==='severe')sev++;if(s==='critical')crit++});
    animateEl(document.getElementById('sTotal'),d.drones.length);
    animateEl(document.getElementById('sWarn'),warn);
    animateEl(document.getElementById('sSev'),sev);
    animateEl(document.getElementById('sCrit'),crit);
    document.getElementById('droneCountLabel').textContent=d.drones.length;
    document.getElementById('footerTime').textContent='更新 '+d.now;

    // Alert notifications
    d.drones.forEach(function(dr){
      var prev=prevAlertLevels[dr.id];
      var cur=dr.status||'active';
      if(cur!==prev&&(cur==='critical'||cur==='severe')){
        if(window.Notification&&Notification.permission==='granted'){
          new Notification('['+(cur==='critical'?'危险':'严重')+'] '+dr.id,{body:'距离 '+(dr.line_name||'?')+' '+(dr.min_distance||0).toFixed(0)+'m',tag:dr.id});
        }
      }
      prevAlertLevels[dr.id]=cur;
    });

    // Update drone markers
    var seen={};
    d.drones.forEach(function(dr){
      if(dr.last_lat==null||dr.last_lon==null)return;
      var id=dr.id||'?';seen[id]=true;
      var lat=dr.last_lat,lon=dr.last_lon;
      var s=dr.status||'active';
      var color=markerColor(s),radius=markerRadius(s);
      if(droneMarkers[id]){
        droneMarkers[id].setLatLng([lat,lon]);
        droneMarkers[id].setStyle({color:color,fillColor:color});
        droneMarkers[id].setRadius(radius);
      }else{
        var m=L.circleMarker([lat,lon],{radius:radius,color:color,fillColor:color,fillOpacity:.55,weight:2.5}).addTo(map);
        m.bindPopup(popupContent(dr));droneMarkers[id]=m;
      }
      if(!firstDroneSeen&&d.drones.length>0){firstDroneSeen=true;map.setView([lat,lon],14)}
    });
    Object.keys(droneMarkers).forEach(function(k){if(!seen[k]){map.removeLayer(droneMarkers[k]);delete droneMarkers[k]}});
    Object.keys(trajPolylines).forEach(function(k){if(!seen[k])removeTrajectory(k)});
    if(activeTrajDrone&&seen[activeTrajDrone]){removeTrajectory(activeTrajDrone);showTrajectory(activeTrajDrone)}

    // Sidebar drone list
    var listDiv=document.getElementById('droneList');
    if(!d.drones.length){
      listDiv.innerHTML='<div class="empty-state">无活跃无人机</div>';
    }else{
      listDiv.innerHTML=d.drones.map(function(dr){
        var s=dr.status||'active';
        var dist=dr.min_distance!=null?dr.min_distance.toFixed(0)+'m':'-';
        var time=(dr.last_seen||'').substring(11,19);
        return '<div class="drone-row" onclick="flyToDrone('+dr.last_lat+','+dr.last_lon+')">'
          +'<span class="d-icon '+s+'"></span>'
          +'<div class="d-info"><div class="d-id">'+dr.id+'</div><div class="d-sub">'+time+' · '+statusZh[s]+'</div></div>'
          +'<div class="d-dist">'+dist+'</div></div>';
      }).join('');
    }
  });

  // Dashboard stats (every 30s to reduce load)
  if(!updateAll._lastStats||Date.now()-updateAll._lastStats>30000){
    updateAll._lastStats=Date.now();
    fetch('/api/stats/dashboard').then(function(r){return r.json()}).then(function(s){
      if(s.hourly_alerts) buildAlertChart(s.hourly_alerts);
      if(s.model_dist) buildModelBars(s.model_dist);
      if(s.station) buildStation(s.station);
    });
  }
}
updateAll._lastStats=0;

// ═══════════ Scan controls ═══════════
function startScan(){
  fetch('/api/start',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({mode:document.getElementById('modeSelect').value})}).then(function(r){return r.json()});
}
function stopScan(){fetch('/api/stop',{method:'POST'}).then(function(r){return r.json()})}

// ═══════════ Notification permission ═══════════
document.addEventListener('click',function f(){
  if(window.Notification&&Notification.permission==='default') Notification.requestPermission();
},{once:true});

// ═══════════ Init ═══════════
loadPowerLines();
updateAll();
setInterval(updateAll,2000);
setInterval(loadPowerLines,60000);
</script>
