<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drone RID Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
/* ── Design Tokens ── */
:root{
  --blue:#2563eb; --green:#16a34a; --yellow:#ca8a04;
  --orange:#ea580c; --red:#dc262e;
  --text:#1a1d23; --muted:#6b7280;
  --surface:#fff; --border:#e0e3e8;
  --radius:10px; --radius-sm:6px;
  --shadow:0 4px 16px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.04);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;font-size:13px;-webkit-font-smoothing:antialiased}
#map{width:100%;height:100%;background:#e8e8e8}

/* ── Sidebar ── */
#sidebar{
  position:fixed;top:0;left:0;width:350px;height:100%;
  background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);
  box-shadow:var(--shadow);z-index:1000;display:flex;flex-direction:column;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
#sidebar.collapsed{transform:translateX(-350px)}
#sidebar .head{
  padding:14px 18px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
#sidebar .head .brand{font-size:15px; font-weight:700; color:var(--text); letter-spacing:-0.3px}
#sidebar .head .brand span{color:var(--muted); font-weight:400; font-size:11px; margin-left:6px}

/* Status dot pulse */
@keyframes dotPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,.4)}
  50%{box-shadow:0 0 0 6px rgba(22,163,74,0)}
}
.status-dot{width:9px; height:9px; border-radius:50%; background:var(--red); display:inline-block; margin-right:6px; transition:background .2s}
.status-dot.live{background:var(--green); animation:dotPulse 2s infinite}

/* Stats mini */
.stats-mini{display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:6px; padding:12px 16px}
.stats-mini .sm{border-radius:8px; padding:10px 6px; text-align:center; font-variant-numeric:tabular-nums; transition:transform .15s}
.stats-mini .sm:hover{transform:translateY(-1px)}
.sm .val{font-size:22px; font-weight:700; line-height:1.1}
.sm .lbl{font-size:10px; color:var(--muted); margin-top:2px}
.sm-info{background:#eff6ff} .sm-info .val{color:var(--blue)}
.sm-warn{background:#fefce8} .sm-warn .val{color:var(--yellow)}
.sm-sev{background:#fff7ed} .sm-sev .val{color:var(--orange)}
.sm-crit{background:#fef2f2} .sm-crit .val{color:var(--red)}

/* Drone list */
#droneList{flex:1; overflow-y:auto; padding:0}
#droneList .drone-row{
  display:flex; align-items:center; gap:10px; padding:10px 16px;
  border-bottom:1px solid #f3f4f6; cursor:pointer;
  transition:background .12s;
}
#droneList .drone-row:hover{background:#f9fafb}
.drone-row .icon{width:10px; height:10px; border-radius:50%; flex-shrink:0}
.drone-row .icon.active{background:var(--green); box-shadow:0 0 5px rgba(22,163,74,.3)}
.drone-row .icon.warning{background:var(--yellow); box-shadow:0 0 5px rgba(202,138,4,.3)}
.drone-row .icon.severe{background:var(--orange); box-shadow:0 0 5px rgba(234,88,12,.3)}
.drone-row .icon.critical{background:var(--red); box-shadow:0 0 5px rgba(220,38,38,.3); animation:dotPulse 1.5s infinite}
.drone-row .icon.gone{background:#bbb}
.drone-row .info{flex:1; min-width:0}
.drone-row .info .did{font-weight:600; font-size:11px; font-family:"JetBrains Mono","SF Mono",Consolas,monospace}
.drone-row .info .sub{font-size:10px; color:var(--muted)}
.drone-row .dist{font-weight:700; font-size:13px; font-variant-numeric:tabular-nums}

/* Power line list */
#plListInSidebar{padding:8px 16px; border-top:1px solid var(--border); max-height:200px; overflow-y:auto}
#plListInSidebar .pl-label{font-size:10px; color:var(--muted); margin-bottom:6px; font-weight:600; letter-spacing:0.3px; text-transform:uppercase}
.pl-mini{display:flex; align-items:center; gap:8px; font-size:11px; padding:5px 0; cursor:pointer; transition:color .15s}
.pl-mini .swatch{width:16px; height:3px; border-radius:1px; flex-shrink:0}
.pl-mini:hover{color:var(--blue)}

/* Footer */
#sidebar .foot{
  padding:10px 16px; border-top:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
  font-size:11px; color:var(--muted);
}

/* Collapse toggle */
#collapseBtn{
  position:fixed; top:14px; left:358px; z-index:1001;
  width:30px; height:30px; border-radius:50%; background:var(--surface);
  border:1px solid var(--border); cursor:pointer; font-size:13px; display:flex;
  align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.08); transition:left .3s cubic-bezier(.4,0,.2,1),transform .2s;
}
#collapseBtn:hover{transform:scale(1.08)}
#collapseBtn.shifted{left:10px}

/* Top-right controls */
#topControls{
  position:fixed; top:14px; right:14px; z-index:1000; display:flex; gap:8px;
}
#topControls .btn-map{
  padding:7px 16px; border-radius:var(--radius-sm); font-size:12px; font-weight:500;
  cursor:pointer; border:1px solid var(--border); background:var(--surface);
  box-shadow:0 1px 4px rgba(0,0,0,.06); transition:all .15s;
}
#topControls .btn-map:hover{background:#f9fafb; border-color:#c0c4cc}

/* Legend */
#legend{
  position:fixed; bottom:28px; right:14px; z-index:1000;
  background:rgba(255,255,255,.94); border-radius:var(--radius);
  padding:12px 16px; box-shadow:var(--shadow); font-size:11px;
  backdrop-filter:blur(8px); border:1px solid var(--border);
}
#legend .leg-item{display:flex; align-items:center; gap:8px; margin:5px 0}
#legend .leg-dot{width:10px; height:10px; border-radius:50%}
#legend .leg-dot.active{box-shadow:0 0 5px rgba(22,163,74,.3)}
#legend .leg-dot.warning{box-shadow:0 0 5px rgba(202,138,4,.3)}
#legend .leg-dot.severe{box-shadow:0 0 5px rgba(234,88,12,.3)}
#legend .leg-dot.critical{box-shadow:0 0 5px rgba(220,38,38,.3)}
#legend .leg-divider{height:1px; background:var(--border); margin:6px 0}

/* Leaflet overrides */
.leaflet-popup-content{font-size:12px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}
.leaflet-popup-content b{font-size:13px}
.popup-row{display:flex; justify-content:space-between; gap:12px; margin:3px 0}
.popup-btn{
  display:inline-block; margin-top:8px; padding:5px 14px; border-radius:var(--radius-sm);
  font-size:11px; font-weight:500; cursor:pointer; border:1px solid var(--blue);
  color:var(--blue); background:#fff; transition:all .15s;
}
.popup-btn:hover{background:#eff6ff}
.popup-btn.traj-active{background:var(--blue); color:#fff}

/* ── Responsive ── */
@media(max-width:640px){
  #sidebar{width:100%; max-width:320px}
  #sidebar.collapsed{transform:translateX(-320px)}
  #collapseBtn{left:328px}
  #collapseBtn.shifted{left:8px}
  .stats-mini{grid-template-columns:1fr 1fr; gap:4px; padding:8px 12px}
  .sm .val{font-size:18px}
  #legend{bottom:10px; right:6px; padding:8px 10px; font-size:10px}
}
</style>
</head>
<body>
<div id="map"></div>

<div id="sidebar">
  <div class="head">
    <div class="brand">
      <span class="status-dot stop" id="statusDot"></span>
      <svg style="vertical-align:-3px;margin-right:2px" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2">
        <circle cx="12" cy="10" r="3"/><path d="M12 2v3m0 10v7M3 12l3-3m12 6l3 3M3 12l3 3m12-6l3-3"/>
      </svg>
      Drone RID Map <span>v2.6</span>
    </div>
    <span style="font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums" id="sidebarTime">--</span>
  </div>
  <div class="stats-mini">
    <div class="sm sm-info"><div class="val" id="sTotal">0</div><div class="lbl">活跃</div></div>
    <div class="sm sm-warn"><div class="val" id="sWarn">0</div><div class="lbl">警告 ≤200m</div></div>
    <div class="sm sm-sev"><div class="val" id="sSev">0</div><div class="lbl">严重 ≤100m</div></div>
    <div class="sm sm-crit"><div class="val" id="sCrit">0</div><div class="lbl">危险 ≤50m</div></div>
  </div>
  <div id="droneList">
    <div style="color:var(--muted);text-align:center;padding:32px 16px">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0112 0v2"/></svg>
      <div style="margin-top:8px;font-size:12px">等待无人机数据...</div>
    </div>
  </div>
  <div id="plListInSidebar">
    <div class="pl-label">
      <svg style="vertical-align:-2px;margin-right:4px" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1,15 8,2 15,15"/></svg>
      电力线
    </div>
    <div id="plItems" style="color:var(--muted);font-size:11px">加载中...</div>
  </div>
  <div class="foot">
    <span id="footerStatus">已停止</span>
    <span id="footerCount">--</span>
  </div>
</div>

<button id="collapseBtn" onclick="toggleSidebar()" title="收起/展开">◀</button>

<div id="topControls">
  <button class="btn-map" onclick="window.location='/'">← 返回列表</button>
</div>

<div id="legend">
  <div class="leg-item"><span class="leg-dot active" style="background:var(--green)"></span> 正常</div>
  <div class="leg-item"><span class="leg-dot warning" style="background:var(--yellow)"></span> 警告 (&lt;200m)</div>
  <div class="leg-item"><span class="leg-dot severe" style="background:var(--orange)"></span> 严重 (&lt;100m)</div>
  <div class="leg-item"><span class="leg-dot critical" style="background:var(--red)"></span> 危险 (&lt;50m)</div>
  <div class="leg-item"><span class="leg-dot" style="background:#bbb"></span> 离线</div>
  <div class="leg-divider"></div>
  <div style="display:flex;align-items:center;gap:8px">
    <span style="display:inline-block;width:20px;border-top:2px dashed #cc4400;opacity:.8"></span> 电力线
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Map init ──
var map = L.map('map', {attributionControl: true}).setView([31, 110], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
}).addTo(map);

// ── Layer groups ──
var droneMarkers = {};
var trajPolylines = {};
var plPolylines = [];
var plLabels = [];
var activeTrajDrone = null;
var firstDroneSeen = false;

// ── Sidebar toggle ──
function toggleSidebar(){
  var sb = document.getElementById('sidebar');
  var btn = document.getElementById('collapseBtn');
  sb.classList.toggle('collapsed');
  btn.classList.toggle('shifted');
  btn.textContent = sb.classList.contains('collapsed') ? '▶' : '◀';
  setTimeout(function(){ map.invalidateSize(); }, 350);
}

// ── Status colors ──
var statusColors = {
  'active':'#16a34a','warning':'#ca8a04','severe':'#ea580c','critical':'#dc262e','gone':'#bbb'
};
var statusZh = {'active':'正常','warning':'警告','severe':'严重','critical':'危险','gone':'离线'};

function markerColor(status){ return statusColors[status] || '#16a34a'; }
function markerRadius(status){
  if(status==='critical') return 10;
  if(status==='severe') return 8;
  if(status==='warning') return 6;
  return 5;
}

// Pulse animation for critical markers
function markerClassName(status){
  return status === 'critical' ? 'pulse-critical' : '';
}

// ── Load power lines ──
function loadPowerLines(){
  fetch('/api/powerlines').then(function(r){return r.json()}).then(function(lines){
    plPolylines.forEach(function(p){ map.removeLayer(p); });
    plLabels.forEach(function(l){ map.removeLayer(l); });
    plPolylines = [];
    plLabels = [];

    var html = '';
    if(lines.length === 0){
      html = '<span style="color:var(--muted)">无电力线</span>';
    }else{
      lines.forEach(function(l){
        var latlngs = [[l.lat1, l.lon1], [l.lat2, l.lon2]];
        var poly = L.polyline(latlngs, {
          color: '#cc4400', weight: 3, dashArray: '10, 8', opacity: 0.85
        }).addTo(map);
        var label = L.tooltip({permanent: true, direction: 'center', className: 'pl-tooltip'})
          .setLatLng([(l.lat1+l.lat2)/2, (l.lon1+l.lon2)/2])
          .setContent('<span style="font-size:10px;background:rgba(255,255,255,.9);padding:2px 6px;border-radius:4px;color:#cc4400;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)">'+l.name+'</span>')
          .addTo(map);
        plPolylines.push(poly);
        plLabels.push(label);

        html += '<div class="pl-mini" onclick="map.flyToBounds([['+l.lat1+','+l.lon1+'],['+l.lat2+','+l.lon2+']],{padding:[60,60]})">'
          +'<span class="swatch" style="background:#cc4400"></span>'+l.name+'</div>';
      });
    }
    document.getElementById('plItems').innerHTML = html;
  });
}

// ── Show trajectory ──
function showTrajectory(droneId){
  if(activeTrajDrone === droneId){
    removeTrajectory(droneId);
    activeTrajDrone = null;
    return;
  }
  if(activeTrajDrone && activeTrajDrone !== droneId){
    removeTrajectory(activeTrajDrone);
  }

  fetch('/api/trajectories/' + encodeURIComponent(droneId) + '/points')
    .then(function(r){return r.json()})
    .then(function(pts){
      if(!pts || pts.length < 2){
        alert('该无人机轨迹数据不足');
        return;
      }
      var latlngs = pts.map(function(p){ return [p.lat, p.lon]; });
      var line = L.polyline(latlngs, {
        color: '#2563eb', weight: 3, opacity: 0.75, smoothFactor: 1
      }).addTo(map);
      var startMarker = L.circleMarker(latlngs[0], {
        radius: 5, color: '#2563eb', fillColor: '#fff', fillOpacity: 1, weight: 2.5
      }).addTo(map);
      var endMarker = L.circleMarker(latlngs[latlngs.length-1], {
        radius: 6, color: '#2563eb', fillColor: '#2563eb', fillOpacity: 1, weight: 2.5
      }).addTo(map);

      trajPolylines[droneId] = {line: line, start: startMarker, end: endMarker};
      activeTrajDrone = droneId;
      map.fitBounds(line.getBounds(), {padding: [60, 60], maxZoom: 16});
    });
}

function removeTrajectory(droneId){
  var layers = trajPolylines[droneId];
  if(layers){
    map.removeLayer(layers.line);
    map.removeLayer(layers.start);
    map.removeLayer(layers.end);
    delete trajPolylines[droneId];
  }
  activeTrajDrone = null;
}

function flyToDrone(lat, lon){
  map.flyTo([lat, lon], Math.max(map.getZoom(), 15), {duration: 0.5});
}

// ── Animate stat value ──
function animateStat(el, target){
  var current = parseInt(el.textContent) || 0;
  if(current === target) return;
  var step = Math.max(1, Math.abs(target - current) / 8);
  var dir = target > current ? 1 : -1;
  function tick(){
    current += step * dir;
    if(dir > 0 ? current >= target : current <= target){
      el.textContent = target;
      return;
    }
    el.textContent = Math.round(current);
    requestAnimationFrame(tick);
  }
  tick();
}

// ── Main update loop ──
function updateMap(){
  fetch('/api/status').then(function(r){return r.json()}).then(function(d){
    var running = d.running;
    var dot = document.getElementById('statusDot');
    dot.className = 'status-dot ' + (running ? 'live' : 'stop');
    document.getElementById('footerStatus').textContent = running ? '运行中 ('+d.mode.toUpperCase()+')' : '已停止';

    // Stats with animation
    var warn=0, sev=0, crit=0;
    d.drones.forEach(function(dr){
      var s=dr.status; if(s==='warning')warn++; if(s==='severe')sev++; if(s==='critical')crit++;
    });
    animateStat(document.getElementById('sTotal'), d.drones.length);
    animateStat(document.getElementById('sWarn'), warn);
    animateStat(document.getElementById('sSev'), sev);
    animateStat(document.getElementById('sCrit'), crit);
    document.getElementById('footerCount').textContent = '更新 '+d.now;

    var seen = {};

    d.drones.forEach(function(dr){
      if(dr.last_lat == null || dr.last_lon == null) return;
      var id = dr.id || '?';
      seen[id] = true;
      var lat = dr.last_lat, lon = dr.last_lon;
      var status = dr.status || 'active';
      var color = markerColor(status);
      var radius = markerRadius(status);

      if(droneMarkers[id]){
        droneMarkers[id].setLatLng([lat, lon]);
        droneMarkers[id].setStyle({color: color, fillColor: color});
        droneMarkers[id].setRadius(radius);
      }else{
        var marker = L.circleMarker([lat, lon], {
          radius: radius, color: color, fillColor: color,
          fillOpacity: 0.55, weight: 2.5
        }).addTo(map);
        marker.bindPopup(popupContent(dr));
        droneMarkers[id] = marker;
      }

      if(!firstDroneSeen && d.drones.length > 0){
        firstDroneSeen = true;
        map.setView([lat, lon], 14);
      }
    });

    Object.keys(droneMarkers).forEach(function(k){
      if(!seen[k]){
        map.removeLayer(droneMarkers[k]);
        delete droneMarkers[k];
      }
    });

    Object.keys(trajPolylines).forEach(function(k){
      if(!seen[k]) removeTrajectory(k);
    });

    if(activeTrajDrone && seen[activeTrajDrone]){
      removeTrajectory(activeTrajDrone);
      showTrajectory(activeTrajDrone);
    }

    // Sidebar drone list
    var listDiv = document.getElementById('droneList');
    if(d.drones.length === 0){
      listDiv.innerHTML = '<div style="color:var(--muted);text-align:center;padding:32px 16px"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0112 0v2"/></svg><div style="margin-top:8px;font-size:12px">等待无人机数据...</div></div>';
    }else{
      listDiv.innerHTML = d.drones.map(function(dr){
        var s = dr.status || 'active';
        var dist = dr.min_distance != null ? dr.min_distance.toFixed(0)+'m' : '-';
        var time = (dr.last_seen||'').substring(11,19);
        return '<div class="drone-row" onclick="flyToDrone('+dr.last_lat+','+dr.last_lon+')">'
          +'<span class="icon '+s+'"></span>'
          +'<div class="info"><div class="did">'+dr.id+'</div><div class="sub">'+time+' · '+statusZh[s]+'</div></div>'
          +'<div class="dist">'+dist+'</div>'
          +'</div>';
      }).join('');
    }

    document.getElementById('sidebarTime').textContent = d.now;
  });
}

function popupContent(dr){
  var s = dr.status || 'active';
  var dist = dr.min_distance != null ? dr.min_distance.toFixed(0)+' m' : '--';
  var alt = dr.last_alt != null ? dr.last_alt.toFixed(0)+' m' : '--';
  var lineName = dr.line_name || '--';
  return '<b>'+dr.id+'</b>'
    +'<div class="popup-row"><span>状态:</span><span style="color:'+markerColor(s)+';font-weight:600">'+statusZh[s]+'</span></div>'
    +'<div class="popup-row"><span>经度:</span><span>'+(dr.last_lon||0).toFixed(5)+'</span></div>'
    +'<div class="popup-row"><span>纬度:</span><span>'+(dr.last_lat||0).toFixed(5)+'</span></div>'
    +'<div class="popup-row"><span>高度:</span><span>'+alt+'</span></div>'
    +'<div class="popup-row"><span>距离:</span><span>'+dist+'</span></div>'
    +'<div class="popup-row"><span>最近电力线:</span><span>'+lineName+'</span></div>'
    +'<button class="popup-btn'+(activeTrajDrone===dr.id?' traj-active':'')+'" onclick="showTrajectory(\''+dr.id+'\')">'
    +(activeTrajDrone===dr.id?'隐藏轨迹':'显示轨迹')+'</button>';
}

// ── Start ──
loadPowerLines();
updateMap();
setInterval(updateMap, 1500);
setInterval(loadPowerLines, 30000);
</script>
</body>
</html>
