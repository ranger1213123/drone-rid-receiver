<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drone RID Monitor — 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  background:#0b1120; color:#e2e8f0; min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

/* Subtle grid overlay */
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:60px 60px;
}

/* Topography ring in background */
body::after{
  content:''; position:fixed; width:700px; height:700px;
  border-radius:50%; border:1px solid rgba(37,99,235,.08);
  top:50%; left:50%; transform:translate(-50%,-50%);
  box-shadow:0 0 200px rgba(37,99,235,.04),inset 0 0 200px rgba(37,99,235,.03);
  z-index:0; pointer-events:none;
}

.container{
  position:relative; z-index:1; display:flex;
  background:rgba(15,23,42,.9); border:1px solid rgba(255,255,255,.06);
  border-radius:16px; overflow:hidden;
  box-shadow:0 0 0 1px rgba(255,255,255,.03),0 24px 80px rgba(0,0,0,.5);
  width:780px; max-width:94vw; min-height:440px;
}

/* Left branding panel */
.brand-panel{
  width:320px; background:linear-gradient(160deg,rgba(37,99,235,.15),rgba(15,23,42,.8));
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  padding:40px 28px; text-align:center; border-right:1px solid rgba(255,255,255,.04);
}
.brand-panel .shield{
  width:64px; height:64px; margin-bottom:20px; position:relative;
}
.brand-panel .shield svg{width:100%;height:100%}
.brand-panel h2{font-size:18px;font-weight:700;letter-spacing:-0.3px;margin-bottom:6px}
.brand-panel .sub{font-size:11px;color:#64748b;line-height:1.6}
.brand-panel .dot-row{display:flex;gap:8px;margin-top:24px}
.brand-panel .dot-row span{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.2);transition:background .3s;
}
.brand-panel .dot-row span:nth-child(1){background:#22c55e}
.brand-panel .dot-row span:nth-child(3){background:#eab308}
.brand-panel .dot-row span:nth-child(5){background:#ef4444}

/* Right form panel */
.form-panel{
  flex:1; display:flex; flex-direction:column; justify-content:center;
  padding:40px 44px;
}
.form-panel h3{font-size:13px;font-weight:600;margin-bottom:4px;letter-spacing:0.5px}
.form-panel .hint{font-size:11px;color:#64748b;margin-bottom:24px}

.field{margin-bottom:16px}
.field label{
  display:block; font-size:10px; font-weight:600; color:#94a3b8;
  text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px;
}
.field input{
  width:100%; padding:10px 14px; background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08); border-radius:8px;
  color:#e2e8f0; font-size:13px; outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.field input:focus{
  border-color:rgba(37,99,235,.5);
  box-shadow:0 0 0 3px rgba(37,99,235,.1);
}
.field input::placeholder{color:#475569}

.submit-btn{
  width:100%; padding:10px; border-radius:8px; font-size:13px; font-weight:600;
  cursor:pointer; border:none; color:#fff; letter-spacing:0.3px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  transition:all .2s; margin-top:4px;
}
.submit-btn:hover{background:linear-gradient(135deg,#3b82f6,#2563eb);box-shadow:0 4px 16px rgba(37,99,235,.3)}

.error-msg{
  background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.2);
  color:#f87171; font-size:11px; padding:8px 12px; border-radius:6px;
  margin-bottom:18px; text-align:center;
}

.footnote{font-size:10px;color:#475569;text-align:center;margin-top:20px}

@media(max-width:600px){
  .container{flex-direction:column;width:100%}
  .brand-panel{width:100%;padding:24px 20px;border-right:none;border-bottom:1px solid rgba(255,255,255,.04)}
  .brand-panel .shield{width:40px;height:40px;margin-bottom:10px}
  .brand-panel h2{font-size:15px}
  .brand-panel .dot-row{margin-top:12px}
  .form-panel{padding:24px 20px}
}
</style>
</head>
<body>

<div class="container">
  <div class="brand-panel">
    <div class="shield">
      <svg viewBox="0 0 64 64" fill="none">
        <path d="M32 4L54 14v20c0 14-10 22-22 26-12-4-22-12-22-26V14L32 4z" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M32 4L10 14v20c0 14 10 22 22 26 12-4 22-12 22-26V14L32 4z" fill="rgba(37,99,235,.15)"/>
        <path d="M24 32l6 6 10-12" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2>Drone RID Monitor</h2>
    <div class="sub">无人机远程识别<br>电力线防碰撞监控</div>
    <div class="dot-row"><span></span><span></span><span></span><span></span><span></span></div>
  </div>

  <div class="form-panel">
    <h3>登录系统</h3>
    <div class="hint">请输入凭据以访问监控面板</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label>用户名</label>
        <input type="text" name="username" placeholder="输入用户名" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label>密码</label>
        <input type="password" name="password" placeholder="输入密码" autocomplete="current-password" required>
      </div>
      <button type="submit" class="submit-btn">登 录</button>
    </form>

    <div class="footnote">
      没有账号？<a href="/register" style="color:#60a5fa;text-decoration:none">注册</a>
      &middot; 杆塔端监控系统 &middot; v3.3
    </div>
  </div>
</div>

</body>
</html>
