# 电力线坐标系统: wgs84 (默认) 或 gcj02 (国测局/火星坐标系)
# 若为 gcj02, 加载时自动转换为 wgs84 以对齐无人机 GPS 坐标
coordinate_system: wgs84
protocol: gb46750
# ── 串口 (ESP32 UART) ──
serial:
  auto_scan: true
  device: ""
  baud: 115200
  probe_timeout: 2.0
ble:
  scan_duration: 5
  scan_interval: 1
  device_filter: null
power_lines_file: config/power_lines.yaml
stations_file: config/stations.yaml
thresholds:
  warning: 200
  severe: 100
  critical: 50
stale_timeout: 120
trajectory:
  min_interval: 2.0
  max_points_per_drone: 1000
display:
  update_interval: 1.0
  max_drones_display: 50
database:
  path: data/drone_rid.db
  receiver_path: data/receiver.db
center_db:
  driver: sqlite
  sqlite_path: data/center.db
  host: localhost
  port: 5432
  database: drone_rid_center
  user: drone_rid
  password: ${DB_PASSWORD}
  pool_size: 10
  pool_overflow: 20
  pool_timeout: 30
position:
  source: beidou
  manual_lat: 30.0
  manual_lon: 120.0
  manual_alt: 50.0
beidou:
  mode: simulated
  port: COM1
  baudrate: 115200
  card_id: '0000000001'
  timeout: 5.0
backhaul:
  http:
    endpoint: http://localhost:8080/api/report
    health_url: ''
    heartbeat_url: http://localhost:8080/api/heartbeat
    heartbeat_interval: 30
    timeout: 10
    retry_interval: 30
    headers:
      Content-Type: application/json
  beidou:
    emergency_receiver_id: 0000000099
    min_alert_level: critical
  queue:
    max_size: 1000
  health_check_interval: 15
  device_name: NW-F1
  device_location: 杭州市富阳区-杆塔#12
  auth:
    enabled: false
    token_url: http://localhost:8080/api/auth/token
    device_secret: ${DEVICE_SECRET}
    expire_seconds: 86400
  sms:
    enabled: false
    provider: simulated
    alert_phones:
    - '+8613800138000'
    rate_limit_per_hour: 10
    template_id: SMS_123456789
    alibaba:
      access_key: your_ali_key
      access_secret: your_ali_secret
      sign_name: 无人机监控系统
      template_code: SMS_123456789
    send_from_edge: false
  power_line_sync:
    enabled: true
    interval: 300
    sync_url: ''
# ── MQTT 通信 ──
mqtt:
  enabled: true
  broker:
    host: localhost
    port: 1883
    keepalive: 60
    reconnect_delay_min: 1
    reconnect_delay_max: 120
  tls:
    enabled: false
    ca_cert: /etc/drone-rid/certs/ca.crt
    client_cert: /etc/drone-rid/certs/client.crt
    client_key: /etc/drone-rid/certs/client.key

anti_flapping:
  enabled: false
  debounce_in: 3
  debounce_out: 10
raw_archive:
  enabled: true
  retention_days: 30
  cleanup_interval: 86400
# ── 地图瓦片配置 ──
map:
  tile_standard: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
  tile_satellite: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
  tile_terrain: "https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png"

web_auth:
  # WARNING: 仅供边缘设备本地调试使用。生产环境务必修改 secret_key 和用户密码。
  # 云端使用 DB web_users 表管理用户，不受此配置影响。
  secret_key: change-me-in-production
  users:
  - username: admin
    password: admin123
    role: admin
  - username: user1
    password: user123
    role: user
    station: NW-F1
