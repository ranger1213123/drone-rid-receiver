protocol: gb46750
ble:
  scan_duration: 5
  scan_interval: 1
  device_filter: null
power_lines_file: config/power_lines.yaml
stations_file: config/stations.yaml
thresholds:
  warning: 200
  severe: 100
  critical: 50
stale_timeout: 120
trajectory:
  min_interval: 2.0
  max_points_per_drone: 1000
display:
  update_interval: 1.0
  max_drones_display: 50
database:
  path: data/drone_rid.db
center_db:
  driver: sqlite
  sqlite_path: data/center.db
  host: localhost
  port: 5432
  database: drone_rid_center
  user: drone_rid
  password: ${DB_PASSWORD}
  pool_size: 10
  pool_overflow: 20
  pool_timeout: 30
position:
  source: beidou
  manual_lat: 30.0
  manual_lon: 120.0
  manual_alt: 50.0
beidou:
  mode: simulated
  port: COM1
  baudrate: 115200
  card_id: '0000000001'
  timeout: 5.0
backhaul:
  http:
    endpoint: http://localhost:8080/api/report
    health_url: ''
    heartbeat_url: http://localhost:8080/api/heartbeat
    heartbeat_interval: 30
    timeout: 10
    retry_interval: 30
    headers:
      Content-Type: application/json
  beidou:
    emergency_receiver_id: 0000000099
    min_alert_level: critical
  queue:
    max_size: 1000
  health_check_interval: 15
  device_name: NW-F1
  device_location: 杭州市富阳区-杆塔#12
  auth:
    enabled: false
    token_url: http://localhost:8080/api/auth/token
    device_secret: ${DEVICE_SECRET}
    expire_seconds: 86400
  sms:
    enabled: false
    provider: simulated
    alert_phones:
    - '+8613800138000'
    rate_limit_per_hour: 10
    template_id: SMS_123456789
    alibaba:
      access_key: your_ali_key
      access_secret: your_ali_secret
      sign_name: 无人机监控系统
      template_code: SMS_123456789
    send_from_edge: false
  power_line_sync:
    enabled: true
    interval: 300
    sync_url: ''
anti_flapping:
  enabled: false
  debounce_in: 3
  debounce_out: 10
airspace:
  enabled: false
  sources:
  - type: yaml
    path: config/power_lines.yaml
  - type: uom
    base_url: https://uom.caac.gov.cn/api
    app_id: ''
    app_key: ''
    cache_ttl: 3600
    cache_path: data/uom_cache.json
pilot_notify:
  enabled: false
  provider: console
  uom:
    base_url: https://uom.caac.gov.cn/api
    app_id: ''
    app_key: ''
raw_archive:
  enabled: true
  retention_days: 30
  cleanup_interval: 86400
web_auth:
  secret_key: change-me-in-production
  users:
  - username: admin
    password: admin123
    role: admin
  - username: user1
    password: user123
    role: user
    station: NW-F1
