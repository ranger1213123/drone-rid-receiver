# 无人机 RID 接收系统配置

# BLE 扫描配置
ble:
  scan_duration: 5           # 每次扫描持续时间 (秒)
  scan_interval: 1           # 扫描间隔 (秒)
  device_filter: null        # MAC 地址过滤列表 (null = 不过滤)

# 电力线配置文件路径
power_lines_file: config/power_lines.yaml

# 距离告警阈值 (米)
thresholds:
  warning: 200    # ≤200m: 记录轨迹
  severe: 100     # ≤100m: 严重警告
  critical: 50    # ≤50m:  危险

# 过时无人机清理 (秒) - 超过此时间未更新的无人机将被标记为离线
stale_timeout: 120

# 轨迹记录配置
trajectory:
  min_interval: 2.0          # 同一无人机轨迹点最小记录间隔 (秒)
  max_points_per_drone: 1000 # 每个无人机最大轨迹点数

# 显示配置
display:
  update_interval: 1.0       # 显示刷新间隔 (秒)
  max_drones_display: 50     # 最多显示无人机数

# 数据库
database:
  path: data/drone_rid.db
