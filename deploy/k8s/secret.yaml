apiVersion: v1
kind: Secret
metadata:
  name: drone-rid-secret
  namespace: drone-rid
  labels:
    app: drone-rid
type: Opaque
stringData:
  # 数据库密码 — 生产环境使用 SealedSecret 或 ExternalSecret
  DB_PASSWORD: "change-me-in-production"

  # JWT 签名密钥 — 至少 32 字符随机字符串
  JWT_SECRET_KEY: "change-me-to-a-random-32-char-string"

  # 设备密钥 — JSON 映射 (设备名 → 密钥)
  DEVICE_SECRETS: |
    {
      "NW-F1": "device-secret-1",
      "NW-F2": "device-secret-2"
    }
