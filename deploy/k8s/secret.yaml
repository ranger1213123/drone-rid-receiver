apiVersion: v1
kind: Secret
metadata:
  name: drone-rid-secret
  namespace: drone-rid
  labels:
    app: drone-rid
type: Opaque
stringData:
  # 数据库密码 — 生产环境使用 SealedSecret 或 ExternalSecret
  DB_PASSWORD: "change-me-in-production"

  # JWT 签名密钥 — 至少 32 字符随机字符串
  JWT_SECRET_KEY: "change-me-to-a-random-32-char-string"

  # Web GUI session 签名密钥
  WEB_SECRET_KEY: "change-me-to-a-random-32-char-string"

  # 设备密钥 — JSON 映射 (设备名 → 密钥)
  # 云部署下优先从 DB device_secrets 表读取，此列为回退
  DEVICE_SECRETS: |
    {
      "NW-F1": "device-secret-1",
      "NW-F2": "device-secret-2"
    }

  # mTLS 证书 (CA + 服务端 + Consumer)
  # 生产环境使用 cert-manager 或 SealedSecret
  CA_CERT: ""
  CA_KEY: ""
  SERVER_CERT: ""
  SERVER_KEY: ""
  CONSUMER_CERT: ""
  CONSUMER_KEY: ""

  # MQTT Consumer 数据库 URL
  CONSUMER_DATABASE_URL: "postgresql://drone_rid:$(DB_PASSWORD)@postgres:5432/drone_rid_center"

  # SMS 短信 (阿里云)
  SMS_ENABLED: "0"
  SMS_PROVIDER: "alibaba"
  ALIBABA_ACCESS_KEY: ""
  ALIBABA_ACCESS_SECRET: ""
  SMS_ALERT_PHONES: ""
