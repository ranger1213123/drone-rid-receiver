# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  WARNING: 本文件包含占位值，绝对不能直接用于生产部署！                     ║
# ║  生产环境请使用: kubectl create secret generic drone-rid-secret --from-literal=...  ║
# ║  或使用 SealedSecret / ExternalSecret (推荐)                                ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
apiVersion: v1
kind: Secret
metadata:
  name: drone-rid-secret
  namespace: drone-rid
  labels:
    app: drone-rid
type: Opaque
stringData:
  # ── 数据库密码 ──
  # 生产: 使用 openssl rand -base64 32 生成随机密码
  DB_PASSWORD: "REPLACE-WITH-RANDOM-32-CHAR-PASSWORD"

  # ── JWT 签名密钥 (至少 32 字符) ──
  # 生产: python -c "import secrets; print(secrets.token_hex(32))"
  JWT_SECRET_KEY: "REPLACE-WITH-RANDOM-64-HEX-STRING"

  # ── Web Session 签名密钥 ──
  # 生产: python -c "import secrets; print(secrets.token_hex(32))"
  WEB_SECRET_KEY: "REPLACE-WITH-RANDOM-64-HEX-STRING"

  # ── 设备预共享密钥 (JSON, 设备名 → 密钥) ──
  # 云部署下优先从 DB device_secrets 表读取，此处为初始回退值
  # 生产: 每个设备使用独立随机密钥
  DEVICE_SECRETS: |
    {}

  # ── mTLS 证书 ──
  # 生产: 使用 cert-manager 签发，或通过 ExternalSecret 注入
  # 如不使用 mTLS 则保持为空
  CA_CERT: ""
  CA_KEY: ""
  SERVER_CERT: ""
  SERVER_KEY: ""
  CONSUMER_CERT: ""
  CONSUMER_KEY: ""

  # ── SMS 短信 (阿里云) ──
  # 如不需要短信告警，保持 SMS_ENABLED=0
  SMS_ENABLED: "0"
  SMS_PROVIDER: "alibaba"
  ALIBABA_ACCESS_KEY: ""
  ALIBABA_ACCESS_SECRET: ""
  SMS_ALERT_PHONES: ""
