apiVersion: v1
kind: ConfigMap
metadata:
  name: drone-rid-config
  namespace: drone-rid
  labels:
    app: drone-rid
data:
  # 中心数据库配置 (PostgreSQL 连接信息由 Secret 提供)
  DATABASE_URL: "postgresql://drone_rid:$(DB_PASSWORD)@postgres:5432/drone_rid_center"
  JWT_EXPIRE_SECONDS: "86400"

  # 应用配置
  config.yaml: |
    thresholds:
      warning: 200
      severe: 100
      critical: 50
    stale_timeout: 120
    display:
      update_interval: 1.0

  power_lines.yaml: |
    power_lines:
      - name: "示例高压线A"
        lat1: 30.0  lon1: 120.0  alt1: 40
        lat2: 30.1  lon2: 120.1  alt2: 42
