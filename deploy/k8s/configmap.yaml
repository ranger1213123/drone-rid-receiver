apiVersion: v1
kind: ConfigMap
metadata:
  name: drone-rid-config
  namespace: drone-rid
  labels:
    app: drone-rid
data:
  # DATABASE_URL 由 Deployment env 注入 (引用 Secret 中的 DB_PASSWORD)
  JWT_EXPIRE_SECONDS: "86400"

  # 应用配置 (云端服务器)
  config.yaml: |
    thresholds:
      warning: 200
      severe: 100
      critical: 50
    stale_timeout: 120
    display:
      update_interval: 1.0
    # 云端数据库
    center_db:
      driver: postgresql
      host: postgres
      port: 5432
      database: drone_rid_center
      user: drone_rid
      pool_size: 10
      pool_overflow: 20
      pool_timeout: 30

  power_lines.yaml: |
    power_lines:
      - name: "示例高压线A"
        lat1: 30.0  lon1: 120.0  alt1: 40
        lat2: 30.1  lon2: 120.1  alt2: 42
