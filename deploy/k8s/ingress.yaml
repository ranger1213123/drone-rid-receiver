apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: center-server
  namespace: drone-rid
  labels:
    app: center-server
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - drone-rid.example.com
      secretName: drone-rid-tls
  rules:
    - host: drone-rid.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: center-server
                port:
                  number: 80
