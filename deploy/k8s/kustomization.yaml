apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: drone-rid

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres-statefulset.yaml
  - emqx-configmap.yaml
  - emqx-statefulset.yaml
  - emqx-service.yaml
  - mqtt-consumer-deployment.yaml
  - server-deployment.yaml
  - server-service.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: drone-rid

images:
  - name: drone-rid-center
    # 生产部署前替换为具体版本号或 Git SHA，禁止使用 latest
    # CI 示例: newTag: ${GIT_SHA}
    newTag: "3.3.0"
